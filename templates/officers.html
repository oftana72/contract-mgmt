{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-people"></i> {{ title }}</span>
            </div>
            <div class="card-body">
                <form method="POST" class="d-flex gap-2 mb-3">
                    <input type="text" name="name" class="form-control" placeholder="Add new..." required>
                    <button class="btn btn-sm btn-primary"><i class="bi bi-plus"></i> Add</button>
                </form>
                <table class="table table-sm mb-0">
                    <thead><tr><th>Name</th><th style="width:60px"></th></tr></thead>
                    <tbody>
                        {% for o in officers %}
                        <tr>
                            <td>{{ o.name }}</td>
                            <td>
                                <form method="POST" action="{{ url_for(endpoint + '_delete', id=o.id) }}" onsubmit="return confirm('Delete {{ o.name }}?')">
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr><td colspan="2" class="text-muted text-center">None yet</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
