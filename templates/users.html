{% extends "base.html" %}
{% block title %}User Management{% endblock %}
{% block content %}
<div class="row g-3">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header"><i class="bi bi-person-plus"></i> Create User</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('user_create') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="text" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_admin" class="form-check-input" id="isAdmin">
                        <label class="form-check-label" for="isAdmin">Administrator</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Create</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card">
            <div class="card-header"><i class="bi bi-people"></i> Users</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td>{{ u.username }}</td>
                                <td>
                                    {% if u.is_admin %}
                                        <span class="badge bg-danger">Admin</span>
                                    {% else %}
                                        <span class="badge bg-secondary">User</span>
                                    {% endif %}
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <form method="POST" action="{{ url_for('user_toggle_admin', id=u.id) }}" style="display:inline">
                                            <button type="submit" class="btn btn-outline-warning btn-sm"
                                                {% if u.id == current_user.id %}disabled{% endif %}>
                                                {% if u.is_admin %}Demote{% else %}Make Admin{% endif %}
                                            </button>
                                        </form>
                                        <button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#resetPwd{{ u.id }}">Reset Pwd</button>
                                        <form method="POST" action="{{ url_for('user_delete', id=u.id) }}" style="display:inline"
                                            onsubmit="return confirm('Delete user {{ u.username }}?')">
                                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                                {% if u.id == current_user.id %}disabled{% endif %}>Delete</button>
                                        </form>
                                    </div>
                                    <!-- Reset Password Modal -->
                                    <div class="modal fade" id="resetPwd{{ u.id }}" tabindex="-1">
                                        <div class="modal-dialog modal-sm">
                                            <div class="modal-content">
                                                <form method="POST" action="{{ url_for('user_reset_password', id=u.id) }}">
                                                    <div class="modal-header">
                                                        <h6 class="modal-title">Reset Password - {{ u.username }}</h6>
                                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                    </div>
                                                    <div class="modal-body">
                                                        <input type="text" name="password" class="form-control" placeholder="New password" required>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="submit" class="btn btn-primary btn-sm">Save</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
