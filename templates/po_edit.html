{% extends "base.html" %}
{% block title %}Edit PO {{ po.po_number }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header"><i class="bi bi-pencil"></i> Edit PO #{{ po.po_number or po.id }}</div>
            <div class="card-body">
                <form method="POST">
                    {% set lc = po.letter_of_credits.first() %}

                    <ul class="nav nav-tabs mb-3" id="editTabs" role="tablist">
                        <li class="nav-item"><button class="nav-link active" id="po-tab" data-bs-toggle="tab" data-bs-target="#poTab" type="button">PO Details</button></li>
                        <li class="nav-item"><button class="nav-link" id="lc-tab" data-bs-toggle="tab" data-bs-target="#lcTab" type="button">Letter of Credit</button></li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="poTab">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Received Date</label>
                                    <input type="date" name="received_date" class="form-control" value="{{ po.received_date.strftime('%Y-%m-%d') if po.received_date else '' }}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Tender Reference</label>
                                    <input type="text" name="tender_reference" class="form-control" value="{{ po.tender_reference or '' }}">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Total Amount</label>
                                    <input type="number" step="0.01" name="total_po_amount" class="form-control" value="{{ po.total_po_amount or '' }}">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Currency</label>
                                    <select name="currency" class="form-select">
                                        <option value="">--</option>
                                        <option {{ 'selected' if po.currency == 'USD' }}>USD</option>
                                        <option {{ 'selected' if po.currency == 'ETB' }}>ETB</option>
                                        <option {{ 'selected' if po.currency == 'EUR' }}>EUR</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Mode of Shipment</label>
                                    <input type="text" name="mode_of_shipment" class="form-control" value="{{ po.mode_of_shipment or '' }}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">PO Transferred Date</label>
                                    <input type="date" name="po_transferred_date" class="form-control" value="{{ po.po_transferred_date.strftime('%Y-%m-%d') if po.po_transferred_date else '' }}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">BI Officer</label>
                                    <input type="text" name="bi_officer_name" class="form-control" list="biOfficerList" autocomplete="off" value="{{ po.biofficer.name if po.biofficer else '' }}">
                                    <datalist id="biOfficerList">
                                        {% for o in bi_officers %}<option value="{{ o.name }}">{% endfor %}
                                    </datalist>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Shipment Officer</label>
                                    <input type="text" name="shipment_officer_name" class="form-control" list="shOfficerList" autocomplete="off" value="{{ po.shipment_officer.name if po.shipment_officer else '' }}">
                                    <datalist id="shOfficerList">
                                        {% for o in shipment_officers %}<option value="{{ o.name }}">{% endfor %}
                                    </datalist>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">PO Status</label>
                                    <select name="po_status" class="form-select">
                                        <option value="">--</option>
                                        {% for s in po_statuses %}
                                        <option value="{{ s.name }}" {{ 'selected' if po.po_status and po.po_status.name == s.name }}>{{ s.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Remark</label>
                                    <textarea name="remark" class="form-control" rows="3">{{ po.remark or '' }}</textarea>
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="lcTab">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Opening Status</label>
                                    <select name="lc_status" class="form-select">
                                        <option value="">--</option>
                                        <option {{ 'selected' if lc and lc.opening_status == 'Opened' }}>Opened</option>
                                        <option {{ 'selected' if lc and lc.opening_status == 'LC Expired' }}>LC Expired</option>
                                        <option {{ 'selected' if lc and lc.opening_status == 'No LC needed' }}>No LC needed</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Opened Date</label>
                                    <input type="date" name="lc_opened_date" class="form-control" value="{{ lc.opened_date.strftime('%Y-%m-%d') if lc and lc.opened_date else '' }}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Expiry Date</label>
                                    <input type="date" name="lc_expiry_date" class="form-control" value="{{ lc.expiry_date.strftime('%Y-%m-%d') if lc and lc.expiry_date else '' }}">
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save Changes</button>
                        <a href="{{ url_for('po_detail', po_id=po.id) }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
