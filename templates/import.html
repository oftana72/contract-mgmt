{% extends "base.html" %}
{% block title %}Import Data{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header"><i class="bi bi-upload"></i> Data Import</div>
            <div class="card-body">
                {% if imported %}
                <div class="alert alert-success">Import completed successfully!</div>
                <a href="{{ url_for('login') }}" class="btn btn-primary">Go to Login</a>
                {% else %}
                <form method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="csv_file" class="form-label">Upload CSV file</label>
                        <input class="form-control" type="file" name="csv_file" id="csv_file" accept=".csv" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Import</button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
