services:
  - type: web
    name: contract-mgmt
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: contract-mgmt-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: contract-mgmt-db
    region: frankfurt
    plan: free
